<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Maintenance | Charlene Cordero</title>

    <!-- Alpine.js Plugins -->
    <script defer src="https://unpkg.com/@alpinejs/intersect@3.x.x/dist/cdn.min.js"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@300;400;600&family=Cinzel:wght@400;700&family=Orbitron:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">


</head>

<body class="min-h-screen flex flex-col justify-between bg-[var(--void-moss)] text-[var(--txt-bone)]" x-data="appData()"
    :class="{'light-mode': isLightMode}">

    <!-- Scanline Effect -->
    <div class="scanlines"></div>

    <!-- Background Decorations -->
    <div id="bg-decorations" class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <!-- Falling Petals Container -->
        <div class="falling-petals" id="falling-petals"></div>

        <svg class="absolute left-0 top-0 h-full w-full md:w-1/3 opacity-30" preserveAspectRatio="none"
            viewBox="0 0 100 800">
            <path d="M0,0 C30,150 10,300 40,450 C70,600 20,750 0,900" fill="none" stroke="var(--neon-mint)"
                stroke-width="2" style="filter: drop-shadow(0 0 5px var(--neon-mint));" />
            <path d="M-10,0 C20,200 60,350 10,550 C-20,700 30,800 0,1000" fill="none" stroke="var(--hologram-fern)"
                stroke-width="3" opacity="0.5" />
        </svg>
        <svg class="absolute right-0 top-0 h-full w-full md:w-1/3 opacity-30" preserveAspectRatio="none"
            viewBox="0 0 100 800">
            <g transform="translate(60, 100)">
                <circle cx="0" cy="0" r="4" fill="var(--neon-pink)"
                    style="filter: drop-shadow(0 0 8px var(--neon-pink));">
                    <animate attributeName="cy" from="0" to="20" dur="4s" repeatCount="indefinite" />
                    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="4s" repeatCount="indefinite" />
                </circle>
            </g>
        </svg>
        <svg class="absolute left-1/4 bottom-0 h-1/2 w-full md:w-1/3 opacity-20 pointer-events-none"
            preserveAspectRatio="none" viewBox="0 0 100 100">
            <!-- Animated Neon Plant -->
            <path d="M50,100 Q60,50 50,0" stroke="var(--neon-mint)" stroke-width="0.5" fill="none">
                <animate attributeName="d" values="M50,100 Q60,50 50,0; M50,100 Q40,50 50,0; M50,100 Q60,50 50,0"
                    dur="10s" repeatCount="indefinite" />
            </path>
            <circle cx="50" cy="10" r="2" fill="var(--neon-pink)" opacity="0.8">
                <animate attributeName="cy" values="10; 15; 10" dur="5s" repeatCount="indefinite" />
            </circle>
        </svg>
    </div>

    <!-- Top Header / Status Bar -->
    <header
        class="relative w-full z-50 bg-[var(--void-moss)]/95 border-b border-[var(--neon-pink)]/20 backdrop-blur-md px-4 py-2 md:py-3 shadow-[0_4px_20px_rgba(255,46,136,0.1)] font-tech">
        <div class="max-w-7xl mx-auto flex justify-between items-center">

            <!-- Left: Identity -->
            <div class="flex flex-col md:flex-row md:items-center gap-1 md:gap-4 flex-wrap">
                <div class="flex items-center gap-2 group cursor-pointer" onclick="window.location.href='/'">
                    <span
                        class="text-[var(--neon-pink)] font-tech text-xs md:text-sm tracking-widest font-bold drop-shadow-[0_0_5px_rgba(255,46,136,0.5)]">>>
                        CHARLENE CORDERO</span>
                    <span class="animate-pulse text-[var(--neon-mint)]">_</span>
                </div>
                <div class="hidden md:block w-px h-3 bg-[var(--neon-pink)]/40"></div>
                <div class="flex items-center gap-2">
                    <span class="text-[var(--neon-pink)]">>></span>
                    <span
                        class="text-[var(--txt-muted)] text-[9px] md:text-[10px] font-tech tracking-[0.1em] leading-tight whitespace-nowrap">
                        SYSTEM MAINTENANCE
                    </span>
                </div>
            </div>

            <!-- Right: System Stats -->
            <div
                class="flex flex-col md:flex-row items-end md:items-center justify-end gap-1 md:gap-4 text-[8px] md:text-[10px] font-tech tracking-wider text-[var(--neon-mint)]/80 leading-none pr-2 md:pr-0">
                <!-- Theme Toggle -->
                <div class="absolute top-1/2 left-[60%] -translate-x-1/2 -translate-y-1/2 flex items-center gap-2 cursor-pointer group md:static md:transform-none md:order-none md:mt-[13px]"
                    @click="toggleTheme()" :title="isLightMode ? 'Switch to Dark Mode' : 'Switch to Light Mode'">
                    <!-- Sun Icon (Left) -->
                    <i class="fa-solid fa-sun text-[10px] transition-colors duration-300"
                        :class="isLightMode ? 'text-[#eab308] drop-shadow-[0_0_5px_rgba(234,179,8,0.8)]' : 'text-[var(--txt-muted)]'"></i>

                    <!-- Switch Track -->
                    <div
                        class="w-8 h-4 rounded-full relative transition-colors duration-300 border border-[var(--neon-mint)]/30 group-hover:border-[var(--neon-mint)] bg-[var(--hologram-fern)]">
                        <!-- Switch Thumb -->
                        <div class="absolute top-0.5 left-0.5 w-3 h-3 bg-[var(--txt-bone)] rounded-full shadow transition-transform duration-300 transform"
                            :class="isLightMode ? 'translate-x-0 bg-white' : 'translate-x-4 bg-[var(--neon-mint)]'">
                        </div>
                    </div>

                    <!-- Moon Icon (Right) -->
                    <i class="fa-solid fa-moon text-[10px] transition-colors duration-300"
                        :class="!isLightMode ? 'text-[var(--neon-mint)] drop-shadow-[0_0_5px_rgba(74,242,161,0.5)]' : 'text-[var(--txt-muted)]'"></i>
                </div>

                <div class="flex items-center gap-1 md:gap-2">
                    <span class="text-[var(--txt-muted)]">STATUS:</span>
                    <span class="animate-pulse text-[var(--neon-pink)]">OFFLINE</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 pb-20 flex-grow flex items-center justify-center">

        <div
            class="alien-border glass-panel p-8 md:p-16 flex flex-col items-center justify-center text-center relative max-w-3xl w-full">
            <div class="absolute top-4 right-4 animate-pulse">
                <i class="fa-solid fa-triangle-exclamation text-4xl text-[var(--neon-pink)]/50"></i>
            </div>

            <i
                class="fa-solid fa-hammer text-6xl md:text-8xl mb-6 text-[var(--neon-mint)] drop-shadow-[0_0_15px_rgba(74,242,161,0.5)] animate-bounce"></i>

            <h1
                class="font-futuristic text-3xl md:text-5xl text-[var(--neon-pink)] mb-4 tracking-wider drop-shadow-[0_0_5px_rgba(255,46,136,0.8)]">
                MAINTENANCE MODE
            </h1>

            <p class="font-tech text-sm md:text-base text-[var(--txt-bone)] mb-8 max-w-lg mx-auto">
                >> SYSTEM_UPGRADE_IN_PROGRESS<br><br>
                The Neural Archives are currently undergoing scheduled maintenance. I am implementing new features and
                optimizing the system core.
            </p>

            <h2 class="font-tech text-2xl text-[var(--neon-mint)] animate-pulse tracking-widest font-bold">
                BE_BACK_SOON_
            </h2>

            <div class="mt-8 flex gap-4">
                <a href="https://linkedin.com/in/charleneannecordero" target="_blank"
                    class="text-[var(--neon-mint)] hover:text-[var(--neon-pink)] transition-colors text-2xl">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                <a href="https://github.com/chaiai-py" target="_blank"
                    class="text-[var(--neon-mint)] hover:text-[var(--neon-pink)] transition-colors text-2xl">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
